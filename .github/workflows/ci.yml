name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Stage 1 : Tests
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: cd app && npm ci
      - name: Run tests
        run: |
          cd app
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: app/test-output.txt

  # Stage 2 : Build image Docker (reusable workflow)
  build:
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image-name: devops-app
      context: ./app

  # Stage 2b : Smoke test
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./app
          load: true
          push: false
          tags: devops-app:smoke
          cache-from: type=gha
      - name: Smoke test
        run: |
          docker run -d -p 3000:3000 --name smoke devops-app:smoke
          sleep 2
          curl -f http://localhost:3000/health
          curl -f http://localhost:3000/metrics
          docker stop smoke

  # Stage 3 : Scan de sécurité
  security-scan:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Scanner les dépendances
      - name: Scan dependencies
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "app/"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "table"

      # Scanner l'image Docker
      - name: Build image for scanning
        run: docker build -t devops-app:scan app/

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "devops-app:scan"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "sarif"
          output: "trivy-results.sarif"

      # Upload SARIF pour GitHub Security tab
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      # Scanner IaC (Terraform)
      - name: Scan IaC
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "config"
          scan-ref: "infra/"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      # Scanner les secrets
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 4 : Deploy staging (auto)
  deploy-staging:
    needs: [smoke-test, security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Deploying to staging..."

  # Stage 5 : Deploy production (reviewer requis + wait timer)
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deploying to production version ${{ github.sha }}..."
