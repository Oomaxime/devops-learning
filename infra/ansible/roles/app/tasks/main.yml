---
- name: Créer le répertoire d'application
  file:
    path: /opt/app
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copier le fichier de configuration
  copy:
    content: |
      # Configuration de l'application
      APP_ENV=production
      APP_LOG_LEVEL=info
      APP_PORT=3000
    dest: /opt/app/.env
    mode: '0600'
